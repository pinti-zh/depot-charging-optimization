[project]
name = "depot-charging-optimization"
version = "0.0.1"
description = "Depot Charging Optimization"
requires-python = ">=3.11"
dependencies = [
    "click",
    "gurobipy",
    "numpy",
    "plotly",
    "ruff",
    "rich",
    "pytest",
    "fastapi",
    "uvicorn",
    "pydantic",
    "jinja2",
    "pandas",
    "casadi",
]

[project.scripts]
optimize = "depot_charging_optimization.scripts.optimize:optimize"
clean-data = "depot_charging_optimization.scripts.clean_data:clean_data"
preprocess-data = "depot_charging_optimization.scripts.preprocess_data:preprocess_data"
plot = "depot_charging_optimization.scripts.plotting_webapp:serve"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.black]
line-length = 119

[tool.ruff]
line-length= 119
ignore = ["E203"]
